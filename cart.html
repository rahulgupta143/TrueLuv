<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Cart</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial;
      }

      body {
        background: #f5f5f5;
        padding: 20px;
      }

      .title {
        text-align: center;
        margin-bottom: 20px;
      }

      .products {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
      }

      .product-card {
        background: #fff;
        padding: 15px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        text-align: center;
      }

      .product-card img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-radius: 6px;
      }

      .product-card h3 {
        margin: 10px 0;
      }

      .price {
        color: #e91e63;
        font-weight: bold;
      }

      button {
        margin-top: 10px;
        padding: 8px 14px;
        border: none;
        background: #e91e63;
        color: white;
        cursor: pointer;
        border-radius: 5px;
      }

      button:hover {
        background: #c2185b;
      }

      /* ⭐ Rating */
      .rating span {
        font-size: 20px;
        cursor: pointer;
        color: #ccc;
      }

      .rating span.active {
        color: gold;
      }

      /* Cart */
      .cart-item {
        background: white;
        padding: 15px;
        margin-bottom: 10px;
        display: flex;
        gap: 15px;
        align-items: center;
      }

      .cart-item img {
        width: 80px;
        border-radius: 5px;
      }

      .cart-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        text-decoration: none;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h2 class="title">Your Cart</h2>
    <div id="cart-container"></div>
  </body>
  <script src="js/script.js"></script>
  <script src="js/product.js"></script>
</html>
