<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cosmetics | TrueLuv</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="popup/popup.css" />
  </head>
  <body>
    <!-- HEADER -->
    <header>
      <div class="logo"><a href="#">TrueLuv</a></div>

      <!-- DESKTOP MENU -->
      <nav class="heading">
        <ul>
          <li><a href="index.html">HOME</a></li>
          <li><a href="jewellery.html">JEWELLERY</a></li>
          <li><a href="hair.html">HAIR ACCESSORIES</a></li>
          <li><a href="cosmetics.html">COSMETICS</a></li>
        </ul>
      </nav>

      <!-- HAMBURGER ICON -->
      <div class="heading1">
        <ion-icon name="menu" class="ham"></ion-icon>
      </div>

      <!-- MOBILE MENU -->
      <div class="menu">
        <ion-icon name="close" class="close"></ion-icon>
        <ul>
          <li><a href="index.html">HOME</a></li>
          <li><a href="jewellery.html">JEWELLERY</a></li>
          <li><a href="hair.html">HAIR ACCESSORIES</a></li>
          <li><a href="cosmetics.html">COSMETICS</a></li>
        </ul>
      </div>
    </header>

    <!-- Ionicons JS (must include for icons) -->
    <script
      type="module"
      src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"
    ></script>

    <div class="page-title">
      <h2>💖 Cosmetics</h2>
      <p>Feel Pretty, Shine Bright</p>
    </div>

    <!-- ===== MINI PRODUCT POPUP ===== -->
    <div class="mini-product-popup" id="miniProductPopup">
      <span class="mini-close" onclick="closeMiniProduct()">×</span>
      <img id="miniPopupImg" src="" alt="Product" />
      <div class="mini-details">
        <p class="mini-tag">Best Selling</p>
        <h4 id="miniPopupName">Product Name</h4>
        <p id="miniPopupDesc">Short Description</p>
        <p class="mini-price" id="miniPopupPrice">₹0</p>
      </div>
      <button class="mini-dm-btn" onclick="popupOrder()">DM</button>
    </div>

    <!-- ===== WHATSAPP + INSTAGRAM ===== -->
    <a
      href="https://wa.me/918928080078?text=I%20want%20to%20order%20from%20GlowAura"
      class="whatsapp-float"
      target="_blank"
    >
      <img
        src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg"
      />
    </a>

    <a
      href="https://www.instagram.com/"
      class="instagram-float"
      target="_blank"
    >
      <img
        src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png"
      />
    </a>

    <section class="products" id="cosmeticsProducts"></section>
    <script
      type="module"
      src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"
    ></script>

    <script src="js/cosmetics.js"></script>
    <script src="js/script.js"></script>
    <script src="popup/popup.js"></script>
    <script src="popup/popupData.js"></script>

    <script>
      function dmOrder(name, price, img) {
        const message = `Hi, I want to order this product 👇
    
Product: ${name}
Price: ₹${price}
Image: ${window.location.origin}/${img}`;

        const whatsappUrl =
          "https://wa.me/918928080078?text=" + encodeURIComponent(message);

        window.open(whatsappUrl, "_blank");
      }
    </script>
  </body>
</html>
